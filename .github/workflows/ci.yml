name: CI

on:
  push:
  pull_request:

jobs:
  backend:
    name: Backend tests and migrations
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: gym_app_test
          POSTGRES_USER: gym_app
          POSTGRES_PASSWORD: gym_app
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U gym_app -d gym_app_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    defaults:
      run:
        working-directory: backend
    env:
      APP_DATABASE_URL: postgresql+psycopg://gym_app:gym_app@localhost:5432/gym_app_test
      APP_SECRET_KEY: ci-secret-key
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install uv
        run: python -m pip install --upgrade pip uv
      - name: Install backend dependencies
        run: uv sync --frozen
      - name: Run backend tests
        run: uv run pytest
      - name: Verify migrations
        run: uv run alembic upgrade head

  backend-docker:
    name: Backend Docker build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build backend image
        run: docker build ./backend

  frontend:
    name: Frontend tests, lint, typecheck and web export
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        run: npm ci
      - name: Run frontend tests
        run: npm run test
      - name: Run frontend lint
        run: npm run lint
      - name: Run frontend typecheck
        run: npx tsc --noEmit
      - name: Verify web export
        run: npm run web:export
        env:
          EXPO_PUBLIC_API_URL: https://api.example.invalid
