services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: gym_app
      POSTGRES_USER: gym_app
      POSTGRES_PASSWORD: gym_app
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gym_app -d gym_app"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
